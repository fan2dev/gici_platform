services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: gici_backend_server
      POSTGRES_PASSWORD: "NstDUe2TeK_DhFm3XGKcjHPx8zh27AF6"
    volumes:
      - gici_backend_server_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "xAMJotTyKBuMc8dnBvTiji7AlMiDw5O9"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: gici_backend_server_test
      POSTGRES_PASSWORD: "xdwwon7011-Yh5dGdTImJR_qG8c3TTzm"
    volumes:
      - gici_backend_server_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "51dFfLenjvXdmPA2pNGadlC3DrfUQx48"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  gici_backend_server_data:
  gici_backend_server_test_data:
