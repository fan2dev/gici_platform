# Chat message entity

class: ChatMessage

table: chat_message

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  conversationId: UuidValue
  senderUserId: UuidValue
  body: String
  messageType: String
  metadataJson: String?
  deletedAt: DateTime?
  sentAt: DateTime
  createdAt: DateTime

indexes:
  msg_org_idx:
    fields: organizationId
  msg_conversation_idx:
    fields: conversationId
  msg_sender_idx:
    fields: senderUserId
  msg_sent_idx:
    fields: sentAt
