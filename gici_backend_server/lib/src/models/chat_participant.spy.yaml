# Chat conversation participants

class: ChatParticipant

table: chat_participant

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  conversationId: UuidValue
  userId: UuidValue
  joinedAt: DateTime
  lastReadMessageId: UuidValue?
  lastReadAt: DateTime?
  isActive: bool
  createdAt: DateTime
  updatedAt: DateTime

indexes:
  cp_org_idx:
    fields: organizationId
  cp_conversation_idx:
    fields: conversationId
  cp_user_idx:
    fields: userId
  cp_unique_participant:
    fields: conversationId, userId
    unique: true
