# Child-specific document

class: ChildDocument

table: child_document

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  childId: UuidValue
  fileAssetId: UuidValue
  title: String
  description: String?
  visibleToGuardians: bool
  createdByUserId: UuidValue
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  childdoc_org_idx:
    fields: organizationId
  childdoc_child_idx:
    fields: childId
  childdoc_file_idx:
    fields: fileAssetId
