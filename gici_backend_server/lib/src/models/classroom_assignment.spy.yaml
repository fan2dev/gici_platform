# Assignment of children to classrooms

class: ClassroomAssignment

table: classroom_assignment

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  classroomId: UuidValue
  childId: UuidValue
  assignedAt: DateTime
  assignedByUserId: UuidValue?
  withdrawnAt: DateTime?
  withdrawnByUserId: UuidValue?
  withdrawnReason: String?
  status: String
  createdAt: DateTime
  updatedAt: DateTime

indexes:
  ca_org_idx:
    fields: organizationId
  ca_classroom_idx:
    fields: classroomId
  ca_child_idx:
    fields: childId
  ca_unique_active:
    fields: classroomId, childId
    unique: true
