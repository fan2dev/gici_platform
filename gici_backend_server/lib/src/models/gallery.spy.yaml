# Photo/media gallery

class: Gallery

table: gallery

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  title: String
  description: String?
  audienceType: String
  audienceClassroomId: UuidValue?
  audienceChildId: UuidValue?
  createdByUserId: UuidValue
  isPublished: bool
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  gallery_org_idx:
    fields: organizationId
  gallery_audience_idx:
    fields: audienceType
