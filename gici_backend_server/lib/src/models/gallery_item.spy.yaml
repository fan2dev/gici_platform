# Item within a gallery

class: GalleryItem

table: gallery_item

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  galleryId: UuidValue
  fileAssetId: UuidValue
  caption: String?
  sortOrder: int
  createdByUserId: UuidValue
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  galleryitem_org_idx:
    fields: organizationId
  galleryitem_gallery_idx:
    fields: galleryId
  galleryitem_sort_idx:
    fields: galleryId, sortOrder
