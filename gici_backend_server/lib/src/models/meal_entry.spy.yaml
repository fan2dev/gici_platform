# Meal entry for habit tracking

class: MealEntry

table: meal_entry

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  childId: UuidValue
  recordedByUserId: UuidValue
  mealType: String
  consumptionLevel: String
  recordedAt: DateTime
  menuItems: String?
  notes: String?
  photoUrl: String?
  createdAt: DateTime
  updatedAt: DateTime

indexes:
  meal_org_idx:
    fields: organizationId
  meal_child_idx:
    fields: childId
  meal_date_idx:
    fields: recordedAt
  meal_child_date_idx:
    fields: childId, recordedAt
