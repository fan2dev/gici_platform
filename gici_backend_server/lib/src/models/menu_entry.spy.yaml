# Daily menu entry

class: MenuEntry

table: menu_entry

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  menuDate: DateTime
  mealType: String
  title: String
  description: String?
  classroomId: UuidValue?
  createdByUserId: UuidValue
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  menu_org_idx:
    fields: organizationId
  menu_date_idx:
    fields: menuDate
  menu_org_date_idx:
    fields: organizationId, menuDate
