# Daily menu entry — supports multiple menu tracks (normal, menu2/triturado)

class: MenuEntry

table: menu_entry

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  menuDate: DateTime
  menuTrack: String
  mealType: String
  title: String
  description: String?
  createdByUserId: UuidValue
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  menu_org_idx:
    fields: organizationId
  menu_date_idx:
    fields: menuDate
  menu_org_date_idx:
    fields: organizationId, menuDate
  menu_track_idx:
    fields: menuTrack
