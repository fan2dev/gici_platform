# Notification record

class: NotificationRecord

table: notification_record

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  userId: UuidValue
  title: String
  body: String
  category: String
  targetScope: String
  targetClassroomId: UuidValue?
  targetChildId: UuidValue?
  targetUserId: UuidValue?
  createdByUserId: UuidValue
  isRead: bool
  readAt: DateTime?
  createdAt: DateTime

indexes:
  notification_org_idx:
    fields: organizationId
  notification_user_idx:
    fields: userId
  notification_created_idx:
    fields: createdAt
  notification_scope_idx:
    fields: targetScope
