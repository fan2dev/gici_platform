# Organization-level document

class: OrganizationDocument

table: organization_document

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  fileAssetId: UuidValue
  title: String
  description: String?
  visibility: String
  createdByUserId: UuidValue
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  orgdoc_org_idx:
    fields: organizationId
  orgdoc_file_idx:
    fields: fileAssetId
  orgdoc_visibility_idx:
    fields: visibility
