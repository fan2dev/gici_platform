# Pedagogical progress report

class: PedagogicalReport

table: pedagogical_report

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  childId: UuidValue
  reportDate: DateTime
  title: String
  summary: String
  body: String
  status: String
  visibility: String
  createdByUserId: UuidValue
  updatedByUserId: UuidValue?
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  report_org_idx:
    fields: organizationId
  report_child_idx:
    fields: childId
  report_date_idx:
    fields: reportDate
  report_status_idx:
    fields: status
