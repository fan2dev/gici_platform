# Tariff / rate plan for the center

class: Tariff

table: tariff

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  name: String
  description: String?
  schedule: String
  monthlyPrice: double
  includesTransport: bool
  isActive: bool
  createdAt: DateTime
  updatedAt: DateTime
  deletedAt: DateTime?

indexes:
  tariff_org_idx:
    fields: organizationId
  tariff_active_idx:
    fields: isActive
