# Time tracking entry for staff check-in/check-out

class: TimeEntry

table: time_entry

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue
  userId: UuidValue
  entryType: String
  recordedAt: DateTime
  parentEntryId: UuidValue?
  correctionReason: String?
  locationData: String?
  deviceInfo: String?
  notes: String?
  isManualEntry: bool
  createdByUserId: UuidValue
  createdAt: DateTime

indexes:
  time_org_idx:
    fields: organizationId
  time_user_idx:
    fields: userId
  time_date_idx:
    fields: recordedAt
  time_user_date_idx:
    fields: userId, recordedAt
  time_parent_idx:
    fields: parentEntryId
