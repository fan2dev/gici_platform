# User onboarding progress

class: UserOnboardingState

table: user_onboarding_state

fields:
  id: UuidValue?, defaultPersist=random
  organizationId: UuidValue?
  userId: UuidValue
  introCompletedAt: DateTime?
  termsAcceptedAt: DateTime?
  completedAt: DateTime?
  createdAt: DateTime
  updatedAt: DateTime

indexes:
  onboarding_user_idx:
    fields: userId
    unique: true
  onboarding_org_idx:
    fields: organizationId
